# 💪 ذاكرة كافية للـ Gradle Daemon
org.gradle.jvmargs=-Xmx6g -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError

# ✅ تفعيل AndroidX و Jetifier (لبعض المكتبات القديمة إن وُجدت)
android.useAndroidX=true
android.enableJetifier=true

# 🚀 تحسينات الأداء (اختيارية ولكن مفيدة)
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configureondemand=true

# 🧩 تمكين R8 (المفترض أنه مفعّل افتراضياً في AGP الحديثة)
android.enableR8=true

# 🔧 تفعيل الـ caching (لتسريع البناء المتكرر)
org.gradle.caching=true
